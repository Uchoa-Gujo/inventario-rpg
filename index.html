<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventário RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="authScreen" class="auth-screen">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-badge">Sistema Online</span>
        <h1>Inventário RPG</h1>
        <p>Entre com seu usuário para acessar e salvar seu personagem automaticamente.</p>
      </div>

      <div class="auth-tabs">
        <button id="showLoginTab" class="auth-tab active" type="button">Login</button>
        <button id="showRegisterTab" class="auth-tab" type="button">Criar conta</button>
      </div>

      <div id="loginFormBox">
        <div class="auth-form">
          <div class="field">
            <label for="loginUsuario">Usuário</label>
            <input id="loginUsuario" type="text" placeholder="Digite seu usuário" autocomplete="username" />
          </div>

          <div class="field">
            <label for="loginSenha">Senha</label>
            <div class="password-box">
              <input id="loginSenha" type="password" placeholder="Digite sua senha" autocomplete="current-password" />
              <button class="toggle-password" type="button" data-target="loginSenha">👁</button>
            </div>
          </div>

          <div class="check-line">
            <label class="checkbox">
              <input id="rememberSession" type="checkbox" checked />
              <span>Manter sessão conectada</span>
            </label>
          </div>

          <div class="auth-actions">
            <button id="loginBtn" class="btn primary" type="button">Entrar</button>
          </div>
        </div>
      </div>

      <div id="registerFormBox" class="hidden">
        <div class="auth-form">
          <div class="field">
            <label for="registerUsuario">Usuário</label>
            <input id="registerUsuario" type="text" placeholder="Crie seu usuário" autocomplete="username" />
          </div>

          <div class="field">
            <label for="registerConfirmarUsuario">Confirmar usuário</label>
            <input id="registerConfirmarUsuario" type="text" placeholder="Repita o usuário" autocomplete="username" />
          </div>

          <div class="field">
            <label for="registerSenha">Senha</label>
            <div class="password-box">
              <input id="registerSenha" type="password" placeholder="Crie sua senha" autocomplete="new-password" />
              <button class="toggle-password" type="button" data-target="registerSenha">👁</button>
            </div>
          </div>

          <div class="field">
            <label for="registerConfirmarSenha">Confirmar senha</label>
            <div class="password-box">
              <input id="registerConfirmarSenha" type="password" placeholder="Repita a senha" autocomplete="new-password" />
              <button class="toggle-password" type="button" data-target="registerConfirmarSenha">👁</button>
            </div>
          </div>

          <div class="field">
            <label for="registerFrase">Confirmação</label>
            <input id="registerFrase" type="text" placeholder='Digite: quero criar minha conta' />
          </div>

          <div class="check-line">
            <label class="checkbox">
              <input id="registerConfirmacao" type="checkbox" />
              <span>Confirmo que desejo criar esta conta</span>
            </label>
          </div>

          <div class="auth-actions two">
            <button id="registerBtn" class="btn primary" type="button">Criar conta</button>
            <button id="backToLoginBtn" class="btn secondary" type="button">Voltar</button>
          </div>
        </div>
      </div>

      <div id="authMessage" class="auth-message"></div>
    </div>
  </section>

  <section id="appScreen" class="hidden">
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Inventário RPG</h1>
          <p id="loggedUserText">Usuário:</p>
        </div>

        <div class="topbar-actions">
          <span id="saveStatus" class="save-status">Tudo salvo</span>
          <button id="logoutBtn" class="btn danger" type="button">Sair</button>
        </div>
      </header>

      <main class="layout">
        <aside class="panel">
          <h2>Personagem</h2>

          <div class="field">
            <label for="characterName">Nome</label>
            <input id="characterName" class="main-input" type="text" placeholder="Nome do personagem" />
          </div>

          <div class="field">
            <label for="characterClass">Classe</label>
            <input id="characterClass" class="main-input" type="text" placeholder="Classe" />
          </div>

          <div class="field">
            <label for="characterLevel">Nível</label>
            <input id="characterLevel" class="main-input" type="number" min="1" placeholder="Nível" />
          </div>

          <div class="field">
            <label for="strengthInput">Força</label>
            <input id="strengthInput" class="main-input" type="number" min="0" placeholder="Força" />
          </div>
        </aside>

        <section class="panel">
          <h2>Itens</h2>

          <div class="item-creator">
            <input id="itemNameInput" class="main-input" type="text" placeholder="Nome do item" />
            <button id="addItemBtn" class="btn primary" type="button">Adicionar</button>
          </div>

          <div id="itemsList" class="items-list"></div>
        </section>

        <aside class="panel">
          <h2>Anotações</h2>
          <textarea id="notesInput" class="main-textarea" placeholder="Anotações do personagem..."></textarea>
        </aside>
      </main>
    </div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
