<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventário RPG</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden {
      display: none !important;
    }

    #authScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0b1220;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #111a2b;
      border: 1px solid #22314d;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .auth-card h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #fff;
    }

    .auth-card p {
      margin: 0 0 20px;
      color: #9fb0cc;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .auth-tab {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      background: #1c2940;
      color: #dce7ff;
      font-weight: 600;
    }

    .auth-tab.active {
      background: #27c199;
      color: #08141d;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-form label {
      color: #dce7ff;
      font-size: 14px;
      font-weight: 600;
    }

    .auth-form input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #2b3b59;
      background: #0b1220;
      color: white;
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }

    .auth-form input:focus {
      border-color: #27c199;
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .auth-btn {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .auth-btn.primary {
      background: #27c199;
      color: #08141d;
    }

    .auth-btn.secondary {
      background: #24334f;
      color: #dce7ff;
    }

    .auth-message {
      min-height: 22px;
      margin-top: 10px;
      color: #ffcf6b;
      font-size: 14px;
    }

    #logoutBar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    #loggedUserText {
      color: #dce7ff;
      font-weight: 600;
    }

    #logoutBtn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      background: #a93d3d;
      color: white;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <!-- TELA DE LOGIN / CADASTRO -->
  <div id="authScreen">
    <div class="auth-card">
      <h1>Inventário RPG</h1>
      <p>Entre com seu usuário e senha.</p>

      <div class="auth-tabs">
        <button id="showLoginTab" class="auth-tab active" type="button">Login</button>
        <button id="showRegisterTab" class="auth-tab" type="button">Criar conta</button>
      </div>

      <!-- LOGIN -->
      <div id="loginFormBox">
        <div class="auth-form">
          <div>
            <label for="loginUsuario">Usuário</label>
            <input type="text" id="loginUsuario" placeholder="Seu usuário" autocomplete="username" />
          </div>

          <div>
            <label for="loginSenha">Senha</label>
            <input type="password" id="loginSenha" placeholder="Sua senha" autocomplete="current-password" />
          </div>

          <div class="auth-actions">
            <button id="loginBtn" class="auth-btn primary" type="button">Entrar</button>
          </div>
        </div>
      </div>

      <!-- CADASTRO -->
      <div id="registerFormBox" class="hidden">
        <div class="auth-form">
          <div>
            <label for="registerUsuario">Usuário</label>
            <input type="text" id="registerUsuario" placeholder="Crie um usuário" autocomplete="username" />
          </div>

          <div>
            <label for="registerSenha">Senha</label>
            <input type="password" id="registerSenha" placeholder="Crie uma senha" autocomplete="new-password" />
          </div>

          <div>
            <label for="registerConfirmarSenha">Confirmar senha</label>
            <input type="password" id="registerConfirmarSenha" placeholder="Repita a senha" autocomplete="new-password" />
          </div>

          <div class="auth-actions">
            <button id="registerBtn" class="auth-btn primary" type="button">Criar conta</button>
            <button id="backToLoginBtn" class="auth-btn secondary" type="button">Voltar</button>
          </div>
        </div>
      </div>

      <div id="authMessage" class="auth-message"></div>
    </div>
  </div>

  <!-- APP / INVENTÁRIO -->
  <div id="appScreen" class="hidden">
    <div id="logoutBar">
      <span id="loggedUserText"></span>
      <button id="logoutBtn" type="button">Sair</button>
    </div>
    <div class="app-shell">
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
